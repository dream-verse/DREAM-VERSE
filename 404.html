<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | DREAMVERSE</title>
    <meta name="robots" content="noindex">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:20px;
        }

        .container{
            max-width:650px;
        }

        h1{
            font-size:90px;
            color:#60a5fa;
        }

        h2{
            margin:15px 0;
            font-size:32px;
        }

        p{
            color:#cbd5e1;
            line-height:1.7;
            margin-bottom:35px;
        }

        a{
            display:inline-block;
            padding:14px 28px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
        The page you're looking for doesn't exist or may have been moved.
        Return to the DREAMVERSE homepage to continue exploring our digital experiences.
    </p>

    <a href="/">Back to Home</a>

</div>

</body>
</html>
